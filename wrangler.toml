name = "website"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"

# Static assets (.well-known, icon.svg, /_astro/*, prerendered HTML, ...) live
# inside ./dist alongside the Worker bundle. The Astro Cloudflare adapter reads
# them at runtime via `env.ASSETS.fetch(...)` — without this binding every
# static request returns 500. The `dist/_worker.js/` directory is excluded
# via .assetsignore so wrangler does not refuse the upload.
[assets]
directory = "./dist"
binding = "ASSETS"

# SESSION KV binding required by @astrojs/cloudflare adapter.
[[kv_namespaces]]
binding = "SESSION"
id = "0ba2374477324a06b6a7e0162dcc558d"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
[observability.traces]
enabled = false

# Cloudflare Worker project. Built with @astrojs/cloudflare adapter
# and served from the `dist/_worker.js` entrypoint produced by `astro build`.

# Click-tracking KV for /go/:id redirects. Uncomment after running:
#   npx wrangler kv:namespace create GO_STATS
# and replacing the id below.
# [[kv_namespaces]]
# binding = "GO_STATS"
# id = "REPLACE_WITH_KV_ID"
