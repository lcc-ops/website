name = "website"
compatibility_date = "2025-01-01"

# Cloudflare Pages project. Built with @astrojs/cloudflare and served
# from the `dist/` directory produced by `astro build`.
#
# `pages_build_output_dir` is set automatically when the build is
# run by Cloudflare's build system, so we don't hardcode it here.

# Click-tracking KV for /go/:id redirects. Uncomment after running:
#   npx wrangler kv:namespace create GO_STATS
# and replacing the id below.
# [[kv_namespaces]]
# binding = "GO_STATS"
# id = "REPLACE_WITH_KV_ID"
