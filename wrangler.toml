name = "website"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"

# @astrojs/cloudflare ships a self-contained Worker bundle at dist/_worker.js.
# Prerendered HTML and _astro/ assets live alongside it and are served by the
# Worker itself — do NOT point assets.directory at ./dist, or wrangler will
# treat the _worker.js directory as static assets and abort the deploy.

# SESSION KV binding required by @astrojs/cloudflare adapter.
[[kv_namespaces]]
binding = "SESSION"
id = "0ba2374477324a06b6a7e0162dcc558d"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
[observability.traces]
enabled = false

# Cloudflare Worker project. Built with @astrojs/cloudflare adapter
# and served from the `dist/_worker.js` entrypoint produced by `astro build`.

# Click-tracking KV for /go/:id redirects. Uncomment after running:
#   npx wrangler kv:namespace create GO_STATS
# and replacing the id below.
# [[kv_namespaces]]
# binding = "GO_STATS"
# id = "REPLACE_WITH_KV_ID"
